version: 2

models:
  - name: stg_bus_stops
    description: >
      Cleaned and standardized bus stop reference data.
      One row per bus stop with consistent naming and data types.
    columns:
      - name: bus_stop_code
        description: Unique 5-digit bus stop identifier (natural key)
        tests:
          - unique
          - not_null
      
      - name: road_name
        description: Name of road where bus stop is located
      
      - name: description
        description: Human-readable description (landmark/location)
      
      - name: latitude
        description: Geographic latitude coordinate
      
      - name: longitude
        description: Geographic longitude coordinate

  - name: stg_train_stations
    description: >
      Cleaned and standardized train station reference data.
      One row per train station with consistent naming.
    columns:
      - name: station_code
        description: Station code (e.g., NS1, EW12) - natural key
        tests:
          - unique
          - not_null
      
      - name: station_name
        description: Official English station name
      
      - name: station_name_chinese
        description: Chinese station name
      
      - name: line_name
        description: MRT/LRT line name

  - name: stg_bus_od
    description: >
      Cleaned bus origin-destination journey data.
      Aggregated trip counts between bus stops by hour and day type.
    columns:
      - name: year_month
        description: Period in YYYYMM format (e.g., 202601)
      
      - name: day_type
        description: Type of day (WEEKDAY or WEEKENDS/HOLIDAY)
      
      - name: hour
        description: Hour of day when journey started (0-23)
      
      - name: origin_bus_stop_code
        description: Origin bus stop code
      
      - name: destination_bus_stop_code
        description: Destination bus stop code
      
      - name: trip_count
        description: Aggregate trip count

  - name: stg_train_od
    description: >
      Cleaned train origin-destination journey data.
      Aggregated trip counts between train stations by hour and day type.
    columns:
      - name: year_month
        description: Period in YYYYMM format (e.g., 202601)
      
      - name: day_type
        description: Type of day (WEEKDAY or WEEKENDS/HOLIDAY)
      
      - name: hour
        description: Hour of day when journey started (0-23)
      
      - name: origin_station_code
        description: Origin train station code
      
      - name: destination_station_code
        description: Destination train station code
      
      - name: trip_count
        description: Aggregate trip count
